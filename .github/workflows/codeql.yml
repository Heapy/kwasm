name: CodeQL

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze Java and Kotlin
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: manual
          queries: security-extended
          tools: nightly

      - name: Compile JVM Kotlin sources
        run: >-
          ./gradlew --stacktrace --no-build-cache
          :core:compileKotlinJvm
          :snapshot:compileKotlinJvm
          :wasi:compileKotlinJvm
          :bindgen-api:compileKotlinJvm
          :bindgen-runtime:compileKotlinJvm
          :bindgen-ksp:classes
          :gradle-plugin:classes
          :tck:compileKotlinJvm

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:java-kotlin
